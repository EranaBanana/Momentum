<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Momentum — Habit Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #07070e; --s1: #0e0e1a; --s2: #141422; --s3: #1c1c2e; --s4: #242438;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --text: #eeeef8; --t2: #8888aa; --t3: #50506a;
  --accent: #6c5ce7; --accent2: #a29bfe; --glow: rgba(108,92,231,0.3);
  --green: #00d68f; --gdim: rgba(0,214,143,0.12);
  --red: #ff4757; --rdim: rgba(255,71,87,0.12);
  --amber: #ffa502; --adim: rgba(255,165,2,0.12);
  --cyan: #00cec9; --pink: #fd79a8; --r: 14px; --rsm: 9px;
}
body.theme-serene {
  --bg: #fdf8f5; --s1: #fff8f3; --s2: #fef2ea; --s3: #fde8db; --s4: #fbd9c8;
  --text: #2d1a0e; --t2: #8a5a40; --t3: #b8896a;
  --accent: #c0627a; --accent2: #e8899e; --glow: rgba(192,98,122,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.4s ease, color 0.4s ease;}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 20px 120px;min-height:100vh;}
.ob-overlay{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.ob-card{width:100%;max-width:340px;text-align:center;animation:fadeIn 0.6s ease;}
.ob-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;letter-spacing:-1px;margin-bottom:30px;color:var(--accent);}
.ob-input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r);padding:16px;color:var(--text);font-size:16px;margin-bottom:20px;outline:none;text-align:center;}
.hdr{padding:40px 20px 20px;max-width:480px;margin:0 auto;position:sticky;top:0;background:var(--bg);z-index:100;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.hdr-right{display:flex;gap:8px;}
.hdr-date{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px;}
.hdr-greet{font-family:'Syne',sans-serif;font-weight:700;font-size:24px;letter-spacing:-0.5px;}
.tabs{display:flex;gap:4px;overflow-x:auto;padding:15px 0;margin:0 -20px;padding:15px 20px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 16px;border-radius:20px;background:var(--s2);color:var(--t2);font-size:13px;font-weight:600;white-space:nowrap;border:1px solid var(--border);cursor:pointer;transition:0.2s;}
.tab.active{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 4px 12px var(--glow);}
.view{display:none;animation:viewIn 0.4s ease-out;}
.view.active{display:block;}
.v-hdr{margin:20px 0 25px;}
.v-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.v-sub{font-size:13px;color:var(--t3);margin-top:4px;}
.rings-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:30px;}
.ring-wrap{flex:1;background:var(--s1);padding:15px 10px;border-radius:var(--r);border:1px solid var(--border);text-align:center;}
.ring-svg{position:relative;width:64px;height:64px;margin:0 auto 10px;}
.ring-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'JetBrains Mono';}
.ring-label{font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;}
.hcard{background:var(--s1);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:15px;position:relative;transition:0.3s;cursor:pointer;border-left:4px solid var(--hc);}
.hcard:active{transform:scale(0.98);}
.hcard.done{background:var(--s2);opacity:0.8;}
.hcheck{width:28px;height:28px;border-radius:50%;border:2px solid var(--hc);display:flex;align-items:center;justify-content:center;transition:0.2s;flex-shrink:0;font-size:14px;font-weight:800;color:white;}
.done .hcheck{background:var(--hc);}
.hname{font-weight:600;font-size:15px;margin-bottom:2px;}
.hmeta{font-size:11px;color:var(--t3);display:flex;gap:8px;align-items:center;}
.hdots{margin-left:auto;display:flex;gap:3px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--s3);}
.dot.hit{background:var(--hc);}
.dot.miss{background:var(--rdim);}
.hstreak{position:absolute;top:-8px;right:12px;background:var(--s4);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;color:var(--amber);border:1px solid var(--border2);}
.scard{background:var(--s1);padding:15px;border-radius:var(--r);border:1px solid var(--border);border-top:3px solid var(--sc);}
.slabel{font-size:11px;color:var(--t3);text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.sval{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--text);}
.ssub{font-size:11px;color:var(--t3);margin-top:4px;}
.ccard{background:var(--s1);border-radius:var(--r);padding:20px;border:1px solid var(--border);margin-bottom:15px;}
.chart-h{height:180px;position:relative;}
.btn{border:none;border-radius:var(--rsm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-p{background:var(--accent);color:white;}
.btn-g{background:var(--s3);color:var(--text);}
.btn-red{background:var(--rdim);color:var(--red);}
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:flex-end;justify-content:center;}
.modal{background:var(--s1);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:30px 20px 50px;animation:slideUp 0.3s ease-out;}
@keyframes viewIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.js-tip{position:fixed;background:rgba(14,14,26,0.95);color:white;padding:6px 10px;border-radius:6px;font-size:11px;pointer-events:none;z-index:3000;opacity:0;transition:opacity 0.2s;border:1px solid var(--border2);white-space:nowrap;}
.js-tip.show{opacity:1;}
</style>
</head>
<body>
  <div id="ob" class="ob-overlay" style="display:none">
    <div class="ob-card">
      <div class="ob-logo">momentum.</div>
      <h2 style="margin-bottom:8px;font-family:'Syne'">Welcome.</h2>
      <p style="color:var(--t2);font-size:14px;margin-bottom:24px">What should we call you?</p>
      <input type="text" id="ob-name" class="ob-input" placeholder="Your name..." autofocus>
      <button class="btn btn-p" style="width:100%;padding:14px" onclick="obNext()">Start Building Momentum</button>
    </div>
  </div>

  <div id="app" style="display:none">
    <header class="hdr">
      <div class="hdr-top">
        <div class="logo">momentum<span>.</span></div>
        <div class="hdr-right">
          <button class="btn btn-g btn-sm" onclick="openAdd()">+ Habit</button>
        </div>
      </div>
      <div class="hdr-main">
        <div id="hdr-date" class="hdr-date"></div>
        <div id="hdr-greet" class="hdr-greet"></div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="setTab('today',this)">Today</button>
        <button class="tab" onclick="setTab('analytics',this)">Analytics</button>
        <button class="tab" onclick="setTab('history',this)">History</button>
        <button class="tab" onclick="setTab('manage',this)">Manage</button>
        <button class="tab" onclick="setTab('settings',this)">Settings</button>
      </div>
    </header>

    <main class="wrap">
      <section id="v-today" class="view active">
        <div class="v-hdr"><h2 id="t-title" class="v-title"></h2><p id="t-sub" class="v-sub"></p></div>
        <div id="rings-row" class="rings-row"></div>
        <div id="habits-list"></div>
      </section>

      <section id="v-analytics" class="view">
        <div id="stats-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;"></div>
        <div class="ccard"><h3>30-Day Completion Rate</h3><div class="chart-h"><canvas id="c-habits"></canvas></div></div>
        <div class="ccard"><h3>Consistency Heatmap</h3><div id="hm-grid" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(10px, 1fr));gap:2px;"></div></div>
      </section>

      <section id="v-history" class="view"><div id="hist-table"></div></section>
      <section id="v-manage" class="view"><div id="mgrid"></div></section>
      <section id="v-settings" class="view">
        <div class="ccard">
          <button class="btn btn-red" onclick="localStorage.clear();location.reload();">Clear All Data</button>
        </div>
      </section>
    </main>

    <div id="h-modal" class="modal-wrap">
      <div class="modal">
        <h2 id="modal-title" style="margin-bottom:20px;font-family:'Syne'">Add Habit</h2>
        <input type="text" id="m-name" class="ob-input" placeholder="Habit Name">
        <button class="btn btn-p" style="width:100%" onclick="saveHabit()">Save</button>
        <button class="btn btn-g" style="width:100%;margin-top:10px;" onclick="closeModal()">Cancel</button>
      </div>
    </div>
    <div id="js-tip" class="js-tip"></div>
  </div>
  <script>
// Logic starts here
const COLORS = ['#6c5ce7','#00d68f','#ff4757','#ffa502','#00cec9','#fd79a8'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function load() {
  const r = localStorage.getItem('momentum_data');
  return r ? JSON.parse(r) : {habits:[], logs:[], settings:{name:''}};
}
function save(d) { localStorage.setItem('momentum_data', JSON.stringify(d)); }
window._D = load();

function ds(d){ return d.toISOString().split('T')[0]; }
function today(){ return ds(new Date()); }

function obNext(){
  const name = document.getElementById('ob-name').value.trim();
  if(!name) return;
  window._D.settings.name = name;
  save(window._D);
  document.getElementById('ob').style.display='none';
  startApp(name);
}

function startApp(name){
  document.getElementById('app').style.display='block';
  setHeader(name);
  renderToday();
}

function setHeader(name){
  const now = new Date();
  document.getElementById('hdr-date').textContent = `${DAY_FULL[now.getDay()]}, ${MONTH_SHORT[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('hdr-greet').textContent = `Hello, ${name}`;
}

function setTab(tabId, el){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('v-'+tabId).classList.add('active');
  el.classList.add('active');
  if(tabId === 'analytics') renderAnalytics();
}

function openAdd(){ document.getElementById('h-modal').style.display='flex'; }
function closeModal(){ document.getElementById('h-modal').style.display='none'; }

function saveHabit(){
  const name = document.getElementById('m-name').value.trim();
  if(!name) return;
  window._D.habits.push({id: 'h_'+Date.now(), name, color: COLORS[0], created: today(), days:[0,1,2,3,4,5,6]});
  save(window._D);
  closeModal();
  renderToday();
}

function renderToday(){
  const list = document.getElementById('habits-list');
  const d = window._D;
  list.innerHTML = d.habits.map(h => `
    <div class="hcard" style="--hc:${h.color}" onclick="togHabit('${h.id}')">
      <div class="hname">${h.name}</div>
    </div>
  `).join('');
}

function togHabit(id){
  const t = today();
  const idx = window._D.logs.findIndex(l => l.habitId === id && l.date === t);
  if(idx >= 0) window._D.logs.splice(idx, 1);
  else window._D.logs.push({habitId: id, date: t});
  save(window._D);
  renderToday();
}

window.addEventListener('DOMContentLoaded', () => {
  if(!window._D.settings.name) document.getElementById('ob').style.display='flex';
  else startApp(window._D.settings.name);
});
</script>
</body>
</html>
