<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Momentum — Habit Tracker</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root {
  --bg: #07070e; --s1: #0e0e1a; --s2: #141422; --s3: #1c1c2e; --s4: #242438;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.11);
  --text: #eeeef8; --t2: #8888aa; --t3: #50506a;
  --accent: #6c5ce7; --accent2: #a29bfe; --glow: rgba(108,92,231,0.3);
  --green: #00d68f; --gdim: rgba(0,214,143,0.12);
  --red: #ff4757; --rdim: rgba(255,71,87,0.12);
  --amber: #ffa502; --adim: rgba(255,165,2,0.12);
  --cyan: #00cec9; --pink: #fd79a8; --r: 14px; --rsm: 9px;
}
body.theme-serene {
  --bg: #fdf8f5; --s1: #fff8f3; --s2: #fef2ea; --s3: #fde8db; --s4: #fbd9c8;
  --text: #2d1a0e; --t2: #8a7a6e; --t3: #b0a095;
  --accent: #c0627a; --accent2: #e0829a; --glow: rgba(192,98,122,0.2);
  --border: rgba(0,0,0,0.05); --border2: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  line-height: 1.5; overflow-x: hidden; transition: background 0.4s ease, color 0.4s ease;
}
.wrap { max-width: 500px; margin: 0 auto; padding: 20px; padding-bottom: 100px; min-height: 100vh; position: relative; }
header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
.theme-toggle { padding: 8px 14px; background: var(--s2); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--t2); }
.ob { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.ob-card { background: var(--s1); border: 1px solid var(--border); padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
.ob-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; margin-bottom: 16px; color: var(--accent); }
.ob-q { font-size: 18px; font-weight: 600; margin-bottom: 24px; color: var(--text); }
.fi { width: 100%; padding: 14px 18px; background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-size: 16px; margin-bottom: 20px; outline: none; }
.btn { width: 100%; padding: 14px; border-radius: var(--r); border: none; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; }
.btn-p { background: var(--accent); color: #fff; box-shadow: 0 4px 15px var(--glow); }
.nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 460px; background: rgba(14,14,26,0.8); backdrop-filter: blur(12px); border: 1px solid var(--border2); border-radius: 24px; display: flex; padding: 8px; z-index: 900; }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; color: var(--t3); cursor: pointer; border-radius: 18px; transition: 0.2s; }
.tab.active { background: var(--s3); color: var(--text); }
.sec { display: none; animation: fadeIn 0.4s ease; }
.sec.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 16px; }
.h-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 12px; }
.h-info { display: flex; align-items: center; gap: 12px; }
.h-dot { width: 12px; height: 12px; border-radius: 4px; }
.h-name { font-weight: 600; font-size: 15px; }
.h-streak { font-size: 12px; color: var(--t2); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.h-check { width: 44px; height: 44px; border-radius: 12px; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
.h-check.done { background: var(--green); border-color: var(--green); color: #000; }
</style>
</head>
<body>

<div class="ob" id="ob" style="display:none">
  <div class="ob-card">
    <div class="ob-logo">momentum.</div>
    <div class="ob-q">What should we call you?</div>
    <input class="fi" id="ob-name" placeholder="Your first name" maxlength="20">
    <button class="btn btn-p" onclick="completeOb()">Get Started →</button>
  </div>
</div>

<div class="wrap" id="app">
  <header>
    <div class="logo">momentum.</div>
    <div class="theme-toggle" onclick="toggleTheme()" id="theme-label">Bold</div>
  </header>

  <div id="sec-today" class="sec active">
    <div id="habit-list"></div>
  </div>

  <div id="sec-analytics" class="sec">
    <div class="card"><canvas id="mainChart"></canvas></div>
  </div>

  <div id="sec-habits" class="sec">
    <div class="card">
      <input class="fi" id="new-habit-name" placeholder="New habit name...">
      <button class="btn btn-p" onclick="addHabit()">Add Habit</button>
    </div>
  </div>

  <nav class="nav">
    <div class="tab active" id="tab-today" onclick="goTab('today')">Today</div>
    <div class="tab" id="tab-analytics" onclick="goTab('analytics')">Analytics</div>
    <div class="tab" id="tab-habits" onclick="goTab('habits')">Manage</div>
  </nav>
</div>

<script>
let state = {
  user: { name: '' },
  habits: [
    { id: 1, name: 'Deep Work', color: '#6c5ce7', history: {} },
    { id: 2, name: 'Meditation', color: '#00cec9', history: {} }
  ],
  settings: { theme: 'bold' }
};

function init() {
  const saved = localStorage.getItem('momentum_data');
  if (saved) {
    state = JSON.parse(saved);
    if (state.user.name) {
      document.getElementById('ob').style.display = 'none';
      renderToday();
    } else {
      document.getElementById('ob').style.display = 'flex';
    }
  } else {
    document.getElementById('ob').style.display = 'flex';
  }
}

function completeOb() {
  const name = document.getElementById('ob-name').value;
  if (!name) return;
  state.user.name = name;
  save();
  document.getElementById('ob').style.display = 'none';
  renderToday();
}

function save() { localStorage.setItem('momentum_data', JSON.stringify(state)); }

function toggleTheme() {
  const isSerene = document.body.classList.toggle('theme-serene');
  document.getElementById('theme-label').textContent = isSerene ? 'Serene' : 'Bold';
  state.settings.theme = isSerene ? 'serene' : 'bold';
  save();
}

function goTab(t) {
  document.querySelectorAll('.sec, .tab').forEach(el => el.classList.remove('active'));
  document.getElementById('sec-' + t).classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'analytics') renderAnalytics();
}

function renderToday() {
  const list = document.getElementById('habit-list');
  const today = new Date().toISOString().split('T')[0];
  list.innerHTML = state.habits.map(h => `
    <div class="h-item">
      <div class="h-info">
        <div class="h-dot" style="background:${h.color}"></div>
        <div>
          <div class="h-name">${h.name}</div>
          <div class="h-streak">Current Streak: ${getStreak(h)}</div>
        </div>
      </div>
      <div class="h-check ${h.history[today] ? 'done' : ''}" onclick="toggleHabit(${h.id})">
        ${h.history[today] ? '✓' : ''}
      </div>
    </div>
  `).join('');
}

function toggleHabit(id) {
  const today = new Date().toISOString().split('T')[0];
  const h = state.habits.find(x => x.id === id);
  h.history[today] = !h.history[today];
  save();
  renderToday();
}

function getStreak(h) {
  let s = 0; let d = new Date();
  while(true) {
    let k = d.toISOString().split('T')[0];
    if(h.history[k]) s++; else break;
    d.setDate(d.getDate() - 1);
  }
  return s;
}

function addHabit() {
  const name = document.getElementById('new-habit-name').value;
  if(!name) return;
  state.habits.push({ id: Date.now(), name, color: '#'+Math.floor(Math.random()*16777215).toString(16), history: {} });
  save();
  document.getElementById('new-habit-name').value = '';
  goTab('today');
  renderToday();
}

let chart = null;
function renderAnalytics() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
      datasets: state.habits.map(h => ({
        label: h.name,
        data: [1, 0, 1, 1, 0, 1, 1], // Simplified for demo
        borderColor: h.color,
        tension: 0.4
      }))
    },
    options: { plugins: { legend: { display: false } } }
  });
}

init();
</script>
</body>
</html>
